<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgTech - Diagnóstico Inteligente</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #333;
        }
        header {
            background-color: #2E7D32; /* Verde AgTech */
            color: white;
            width: 100%;
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .container {
            padding: 20px;
            width: 90%;
            max-width: 500px;
            text-align: center;
        }
        #camera-container {
            position: relative;
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            background: #000;
        }
        video {
            width: 100%;
            display: block;
        }
        .btn-scan {
            background-color: #2E7D32;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 50px;
            margin-top: 20px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
            width: 100%;
        }
        .btn-scan:active {
            transform: scale(0.95);
            background-color: #1B5E20;
        }
        #result-box {
            margin-top: 25px;
            padding: 15px;
            background: white;
            border-radius: 15px;
            border-left: 5px solid #2E7D32;
            min-height: 50px;
        }
    </style>
</head>
<body>

    <header>
        <h1>🌱 AgTech</h1>
        <p>Monitoreo Fitopatológico en Tiempo Real</p>
    </header>

    <div class="container">
        <div id="camera-container">
            <video id="camera" autoplay playsinline></video>
        </div>

        <button class="btn-scan" onclick="predict()">🔍 ESCANEAR HOJA</button>

        <div id="result-box">
            <h3 id="result">Iniciando sistema...</h3>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
